services:
  ai-bridge:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # ── Claude auth ──────────────────────────────────────────────────────────
      # Mounted read-only. entrypoint.sh copies .claude.json to /root/.claude.json
      - ${HOME}/.claude.json:/mnt/claude-config/claude.json:ro
      - ${HOME}/.claude:/root/.claude:ro

      # ── Gemini auth ──────────────────────────────────────────────────────────
      # Mounted read-only at /mnt/gemini-auth. entrypoint.sh copies to
      # /root/.gemini (writable) so the CLI can write projects.json etc.
      - ${HOME}/.gemini:/mnt/gemini-auth:ro
      # Uncomment if using gcloud ADC instead of OAuth:
      # - ${HOME}/.config/gcloud:/root/.config/gcloud:ro

    # extra_hosts lets the container reach host services as "host.docker.internal"
    # on Linux (Docker Desktop on Mac/Win adds this automatically).
    extra_hosts:
      - "host.docker.internal:host-gateway"

    restart: unless-stopped
