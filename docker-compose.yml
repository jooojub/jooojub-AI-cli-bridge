services:
  ai-bridge:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # ── Claude auth ──────────────────────────────────────────────────────────
      # Mount the host's Claude config so the CLI is already authenticated.
      - ${HOME}/.claude:/root/.claude:ro

      # ── Gemini auth ──────────────────────────────────────────────────────────
      # The Gemini CLI stores credentials under ~/.config/gemini (or gcloud).
      - ${HOME}/.config/gemini:/root/.config/gemini:ro
      # Uncomment if using gcloud ADC:
      # - ${HOME}/.config/gcloud:/root/.config/gcloud:ro

    # extra_hosts lets the container reach host services as "host.docker.internal"
    # on Linux (Docker Desktop on Mac/Win adds this automatically).
    extra_hosts:
      - "host.docker.internal:host-gateway"

    restart: unless-stopped
