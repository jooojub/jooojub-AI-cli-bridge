services:
  ai-bridge:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # ── Claude auth ──────────────────────────────────────────────────────────
      # .claude.json  : main auth/config file (required)
      # .claude/      : sessions, history, backups
      - ${HOME}/.claude.json:/root/.claude.json:ro
      - ${HOME}/.claude:/root/.claude:ro

      # ── Gemini auth ──────────────────────────────────────────────────────────
      # Gemini CLI stores credentials in ~/.gemini/ (settings.json + oauth token)
      - ${HOME}/.gemini:/root/.gemini:ro
      # Uncomment if using gcloud ADC instead of OAuth:
      # - ${HOME}/.config/gcloud:/root/.config/gcloud:ro

    # extra_hosts lets the container reach host services as "host.docker.internal"
    # on Linux (Docker Desktop on Mac/Win adds this automatically).
    extra_hosts:
      - "host.docker.internal:host-gateway"

    restart: unless-stopped
